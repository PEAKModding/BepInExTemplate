name: Publish

on:
  push:
    tags: ["*[0-9]+.[0-9]+.[0-9]+", "*[0-9]+.[0-9]+.[0-9]+-*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: |
          dotnet restore --locked-mode
          dotnet tool restore

      - name: Publish to Thunderstore
        env:
          ThunderstoreToken: ${{ secrets.THUNDERSTORE_API_TOKEN }}
        run: dotnet pack -c Release -p:PublishTS=true

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./artifacts/package/release/*.nupkg --skip-duplicate --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
