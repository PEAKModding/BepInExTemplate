name: Publish Template to NuGet

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+", "v[0-9]+.[0-9]+.[0-9]+-*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore and Pack
        run: |
          dotnet restore --locked-mode
          dotnet tool restore
          dotnet pack -c Release

      - name: Run Snapshot Tests
        run: dotnet test -c Release

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./artifacts/package/release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
